services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data_v2:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: mlb
      CLICKHOUSE_USER: mlb
      CLICKHOUSE_PASSWORD: mlb
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  clickhouse_data_v2:
